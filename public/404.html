    <script>
      // GitHub Pages 404 redirect fix for SPAs using HashRouter
      // Redirects all 404s back to the root (HashRouter handles the rest)
      window.location.replace(window.location.origin + window.location.pathname.replace(/\/[^\/]*$/, '/') + '#' + window.location.pathname);
    </script>
  </head>
